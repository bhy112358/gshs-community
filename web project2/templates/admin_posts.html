{% extends "base.html" %}
{% block content %}
<h2>게시글 관리</h2>

{% for post in posts %}
<div class="card">
    <p><strong>{{ post.author.username }}</strong></p>
    <p>{{ post.content }}</p>
    <a href="{{ url_for('delete_post', post_id=post.id) }}">삭제</a>
</div>
{% endfor %}
{% endblock %}
